<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Test Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #121212;
      color: #ffffff;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 20px; text-align: center; }
    .test-case {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .test-title { font-weight: bold; margin-bottom: 10px; color: #4ade80; }
    img, .bg-gif {
      width: 180px;
      height: 180px;
      background: #2a2a2a;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }
    .bg-gif {
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #4ade80;
      color: #121212;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>iOS Safari/Chrome GIF Test</h1>

  <div class="test-case">
    <div class="test-title">Test 1: Static HTML &lt;img&gt;</div>
    <img src="videos/0001-2gPfomN.gif" alt="Static Test" />
  </div>

  <div class="test-case">
    <div class="test-title">Test 2: Dynamic JS &lt;img&gt; (Set on click)</div>
    <div id="container-2">
      <div style="text-align: center; color: #888; line-height: 180px; background: #2a2a2a; border-radius: 8px; height: 180px;">No Image</div>
    </div>
    <button onclick="runTest2()">Load Image</button>
  </div>

  <div class="test-case">
    <div class="test-title">Test 3: CSS Background Image (Set on click)</div>
    <div id="container-3" class="bg-gif"></div>
    <button onclick="runTest3()">Load Background</button>
  </div>

  <script>
    function runTest2() {
      const container = document.getElementById('container-2');
      container.innerHTML = '<img src="videos/0001-2gPfomN.gif?t=' + Date.now() + '" alt="Dynamic Test" />';
    }

    function runTest3() {
      const container = document.getElementById('container-3');
      container.style.backgroundImage = "url('videos/0001-2gPfomN.gif?t=" + Date.now() + "')";
    }
  </script>
</body>
</html>
